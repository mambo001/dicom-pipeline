name: Desktop Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and release desktop app
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: dist:mac
            artifact: mac
          - os: windows-latest
            build_cmd: dist:win
            artifact: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run build --workspace @dicom-pipeline/desktop

      - name: Package desktop app
        run: npm run ${{ matrix.build_cmd }} --workspace @dicom-pipeline/desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop/release/*.*

  create-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true