name: Deploy Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: dicom-pipeline-backend
  REPOSITORY: dicom-pipeline-backend
  IMAGE_NAME: dicom-pipeline-backend

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate deployment configuration
        run: |
          test -n "$GCP_PROJECT_ID" || { echo "Missing repository variable GCP_PROJECT_ID" >&2; exit 1; }
          test -n "$GCP_REGION" || { echo "Missing repository variable GCP_REGION" >&2; exit 1; }

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build backend image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" -f apps/backend/Dockerfile .
          docker tag "$IMAGE" "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:latest"

      - name: Push backend image
        run: |
          docker push "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:latest"

      - name: Deploy backend to Cloud Run
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE" \
            --service-account="dicom-pipeline-backend@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --update-env-vars="APP_ENV=production" \
            --update-env-vars="GCS_BUCKET=${GCP_PROJECT_ID}-dicom" \
            --update-env-vars="GCS_SIGNED_URL_TTL_SECONDS=900" \
            --update-env-vars="ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS || 'http://localhost:5173' }}"